name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=bun-darwin-arm64 src/cli/main.ts --outfile=repetit-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: repetit-arm64
          path: repetit-arm64

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=bun-darwin-x64 src/cli/main.ts --outfile=repetit-x64
      - uses: actions/upload-artifact@v4
        with:
          name: repetit-x64
          path: repetit-x64

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=bun-linux-x64 src/cli/main.ts --outfile=repetit-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: repetit-linux-x64
          path: repetit-linux-x64

  release:
    needs: [build-mac-arm64, build-mac-x64, build-linux-x64]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create universal macOS binary
        run: |
          lipo -create -output repetit-darwin-universal repetit-arm64 repetit-x64
          chmod +x repetit-darwin-universal repetit-linux-x64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            repetit-darwin-universal
            repetit-linux-x64
          generate_release_notes: true
